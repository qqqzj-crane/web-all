<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Album</title>
    <meta
      name="description"
      content="album.qqqzj.cn 是四个人共享的私密媒体相册，支持照片、实况照片和短视频。"
    />
    <meta name="theme-color" content="#f7fbff" />
    <link rel="stylesheet" href="styles.css?v=album-20260430" />
    <script defer src="app.js?v=album-20260430"></script>
  </head>
  <body>
    <div class="page-backdrop" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="auth-view" id="auth-view" aria-labelledby="auth-title">
        <div class="auth-panel">
          <div class="auth-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p class="eyebrow">private album</p>
          <h1 id="auth-title">album.qqqzj.cn</h1>
          <form class="login-form" id="login-form">
            <label for="password">相册密码</label>
            <div class="password-row">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
              <button class="primary-button" type="submit">进入</button>
            </div>
          </form>
        </div>
      </section>

      <section class="album-view" id="album-view" hidden>
        <header class="topbar">
          <a class="brand" href="#gallery" aria-label="回到照片墙">
            <span class="brand-mark" aria-hidden="true">A</span>
            <span>
              <strong>Album</strong>
              <small>album.qqqzj.cn</small>
            </span>
          </a>
          <nav class="nav-links" aria-label="相册导航">
            <button class="nav-link" id="gallery-nav" type="button" aria-pressed="true">照片墙</button>
            <button class="nav-link" id="upload-nav" type="button" aria-pressed="false">上传</button>
          </nav>
          <button class="ghost-button" id="logout-button" type="button">退出</button>
        </header>

        <section class="gallery-page" id="gallery-page">
          <section class="toolbar" aria-label="筛选媒体">
            <div class="segmented-control" id="type-filter" role="group" aria-label="媒体类型">
              <button type="button" data-type="all" aria-pressed="true">全部</button>
              <button type="button" data-type="photo">照片</button>
              <button type="button" data-type="live">实况</button>
              <button type="button" data-type="video">视频</button>
            </div>
            <label class="search-field">
              <span>搜索</span>
              <input id="search-input" type="search" placeholder="标题、人物、标签" />
            </label>
            <button class="primary-button upload-shortcut" id="open-upload-button" type="button">上传</button>
          </section>

          <section class="gallery-grid" id="gallery-grid" aria-live="polite"></section>
          <p class="empty-state" id="empty-state" hidden>还没有媒体。先去上传几张照片吧。</p>
        </section>

        <section class="upload-page" id="upload-page" hidden>
          <div class="section-heading">
            <p class="eyebrow">upload</p>
            <h2 id="upload-title">上传媒体</h2>
            <button class="ghost-button" id="back-gallery-button" type="button">返回照片墙</button>
          </div>

          <form class="upload-form" id="upload-form">
            <fieldset>
              <legend>类型</legend>
              <div class="segmented-control" id="upload-type" role="group" aria-label="上传类型">
                <button type="button" data-upload-type="photo" aria-pressed="true">普通照片</button>
                <button type="button" data-upload-type="live">实况照片</button>
                <button type="button" data-upload-type="video">短视频</button>
              </div>
            </fieldset>

            <div class="form-grid">
              <label>
                标题
                <input name="title" type="text" placeholder="留空时使用文件名；批量时会自动编号" />
              </label>
              <label>
                拍摄日期
                <input name="taken_at" type="date" />
              </label>
              <label>
                标签
                <input name="tags" type="text" placeholder="旅行, 聚餐, 复习周" />
              </label>
            </div>

            <label>
              说明
              <textarea name="caption" rows="3" placeholder="给这张照片或视频留一句话"></textarea>
            </label>

            <div class="file-groups">
              <div class="file-group" data-file-group="photo">
                <label>
                  原始照片
                  <input name="photo_original" type="file" accept="image/*,.heic,.heif" multiple />
                </label>
                <label>
                  网页封面（可选）
                  <input name="photo_poster" type="file" accept="image/*" multiple />
                </label>
              </div>

              <div class="file-group" data-file-group="live" hidden>
                <label>
                  实况静态原件
                  <input name="live_still" type="file" accept="image/*,.heic,.heif" multiple />
                </label>
                <label>
                  实况动态原件
                  <input name="live_motion" type="file" accept="video/*,.mov,.mp4" multiple />
                </label>
                <label>
                  网页封面（可选）
                  <input name="live_poster" type="file" accept="image/*" multiple />
                </label>
              </div>

              <div class="file-group" data-file-group="video" hidden>
                <label>
                  视频原件
                  <input name="video_original" type="file" accept="video/*,.mov,.mp4,.m4v" multiple />
                </label>
                <label>
                  网页播放版 MP4（可选）
                  <input name="video_playback" type="file" accept="video/mp4,.mp4" multiple />
                </label>
                <label>
                  视频封面（可选）
                  <input name="video_poster" type="file" accept="image/*" multiple />
                </label>
              </div>
            </div>

            <p class="form-note">
              可以多选文件批量上传。每个媒体会单独请求，单个媒体建议控制在 95MB 以内。
            </p>
            <p class="upload-progress" id="upload-progress" role="status" aria-live="polite"></p>

            <div class="form-actions">
              <button class="primary-button" id="upload-button" type="submit">上传</button>
              <button class="ghost-button" type="reset">清空</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <dialog class="media-dialog" id="media-dialog">
      <button class="dialog-close" id="dialog-close" type="button" aria-label="关闭">×</button>
      <div class="dialog-media" id="dialog-media"></div>
      <div class="dialog-copy">
        <p class="eyebrow" id="dialog-type"></p>
        <h3 id="dialog-title"></h3>
        <p id="dialog-caption"></p>
        <div class="tag-row" id="dialog-tags"></div>
        <div class="dialog-actions">
          <a class="ghost-button" id="download-link" href="#" download>下载原件</a>
          <button class="danger-button" id="delete-button" type="button">删除</button>
        </div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
